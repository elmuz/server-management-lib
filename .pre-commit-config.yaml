# Pre-commit hooks configuration
# See https://pre-commit.com for more information
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  - repo: local
    hooks:
      # Run type checker
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      # Run tests
      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -v --tb=short
        language: system
        types: [python]
        pass_filenames: false

      # Markdown linting (style/formatting)
      - id: pymarkdown
        name: pymarkdown
        entry: uv run pymarkdown -c .pymarkdown fix
        language: system
        types: [markdown]

      # Markdown link checking (relative links + anchors)
      - id: check-md-links
        name: check-md-links
        entry: uv run python scripts/check_md_links.py
        language: system
        types: [markdown]
        pass_filenames: false
